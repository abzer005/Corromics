name: Build Corromics Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows-executable:
    runs-on: windows-latest

    env:
      PYTHON_VERSION: "3.11"
      APP_NAME: "Corromics"
      MAIN_ENV_NAME: "corromics-main"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: base
          python-version: ${{ env.PYTHON_VERSION }}
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict

      - name: Create main app conda environment
        shell: powershell
        run: |
          conda create -y -n $env:MAIN_ENV_NAME python=$env:PYTHON_VERSION pip
          conda run -n $env:MAIN_ENV_NAME python -m pip install --upgrade pip
          conda run -n $env:MAIN_ENV_NAME pip install -r requirements.txt
          conda run -n $env:MAIN_ENV_NAME pip install pyinstaller
          conda run -n $env:MAIN_ENV_NAME pip install git+https://github.com/Wang-Bioinformatics-Lab/GNPSDataPackage.git

      - name: Pack main conda environment
        shell: powershell
        run: |
          conda install -y -c conda-forge conda-pack
          New-Item -ItemType Directory -Force -Path dist_package\envs
          conda-pack -n $env:MAIN_ENV_NAME -o dist_package\main-env.tar.gz --ignore-missing-files
          
      - name: Prepare app folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist_package\Corromics
          New-Item -ItemType Directory -Force -Path dist_package\Corromics\envs
          New-Item -ItemType Directory -Force -Path dist_package\Corromics\logs

          robocopy . dist_package\Corromics /E /XD .git .github dist dist_build dist_package __pycache__ .pytest_cache /XF *.tar.gz
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Unpack main conda environment into app folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist_package\Corromics\envs\main
          tar -xzf dist_package\main-env.tar.gz -C dist_package\Corromics\envs\main        
          dist_package\Corromics\envs\main\Scripts\conda-unpack.exe

      - name: Build launcher executable
        shell: powershell
        run: |
          conda run -n $env:MAIN_ENV_NAME pyinstaller `
            --onefile `
            --name Corromics `
            --distpath dist_package\Corromics `
            --workpath build_launcher `
            --specpath build_launcher `
            launcher.py

      - name: Remove GraphML files from package
        shell: powershell
        run: |
          Get-ChildItem -Path dist_package\Corromics -Recurse -File -Filter *.graphml | Remove-Item -Force

      - name: Create portable ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path dist_package\Corromics `
            -DestinationPath Corromics-Windows-Portable.zip `
            -Force

      - name: Upload Windows portable app
        uses: actions/upload-artifact@v4
        with:
          name: Corromics-Windows-Portable
          path: Corromics-Windows-Portable.zip
