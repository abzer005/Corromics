name: Build Corromics Windows Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows-executable:
    runs-on: windows-latest

    env:
      PYTHON_VERSION: "3.11"
      APP_NAME: "Corromics"
      GEMELLI_ENV_NAME: "gemelli-standalone"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniforge
        uses: conda-incubator/setup-miniconda@v3
        with:
          miniforge-version: latest
          activate-environment: base
          python-version: ${{ env.PYTHON_VERSION }}
          auto-update-conda: true
          channels: conda-forge
          channel-priority: strict

      - name: Install main app dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pip install git+https://github.com/Wang-Bioinformatics-Lab/GNPSDataPackage.git

      - name: Create Gemelli worker conda environment
        shell: powershell
        run: |
          conda env create -f environment-gemelli-worker.yml
          conda clean -afy

      - name: Create Windows launcher script
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path launcher

          @'
          import os
          import sys
          import time
          import socket
          import webbrowser
          import subprocess
          from pathlib import Path

          APP_DIR = Path(__file__).resolve().parent
          LOG_DIR = APP_DIR / "logs"
          LOG_DIR.mkdir(exist_ok=True)

          os.environ["ENVIRONMENT_MODE"] = "local"

          GEMELLI_PYTHON = APP_DIR / "envs" / "gemelli-standalone" / "python.exe"
          os.environ["GEMELLI_WORKER_PYTHON"] = str(GEMELLI_PYTHON)

          PORT = 5000
          URL = f"http://localhost:{PORT}"

          def wait_for_port(host="127.0.0.1", port=5000, timeout=60):
              start = time.time()
              while time.time() - start < timeout:
                  try:
                      with socket.create_connection((host, port), timeout=2):
                          return True
                  except OSError:
                      time.sleep(1)
              return False

          streamlit_exe = APP_DIR / "envs" / "main" / "Scripts" / "streamlit.exe"

          candidates = [
              APP_DIR / "Home.py",
              APP_DIR / "app.py",
              APP_DIR / "main.py",
              APP_DIR / "streamlit_app.py",
          ]

          app_file = None
          for candidate in candidates:
              if candidate.exists():
                  app_file = candidate
                  break

          if app_file is None:
              raise FileNotFoundError(
                  "Could not find Streamlit entry file. Expected one of: Home.py, app.py, main.py, streamlit_app.py"
              )

          cmd = [
              str(streamlit_exe),
              "run",
              str(app_file),
              "--server.port",
              str(PORT),
              "--server.address",
              "127.0.0.1",
              "--server.headless",
              "true",
          ]

          with open(LOG_DIR / "corromics_streamlit.log", "w", encoding="utf-8") as log:
              process = subprocess.Popen(
                  cmd,
                  cwd=str(APP_DIR),
                  stdout=log,
                  stderr=log,
                  shell=False,
              )

          if wait_for_port(port=PORT):
              webbrowser.open(URL)

          process.wait()
          '@ | Set-Content -Path launcher\CorromicsLauncher.py -Encoding UTF8

      - name: Pack conda environments
        shell: powershell
        run: |
          conda install -y -c conda-forge conda-pack

          New-Item -ItemType Directory -Force -Path dist_package\envs

          conda pack -n base -o dist_package\main-env.tar.gz
          conda pack -n $env:GEMELLI_ENV_NAME -o dist_package\gemelli-env.tar.gz

      - name: Prepare app folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist_package\Corromics
          New-Item -ItemType Directory -Force -Path dist_package\Corromics\envs
          New-Item -ItemType Directory -Force -Path dist_package\Corromics\logs

          robocopy . dist_package\Corromics /E /XD .git .github dist dist_package __pycache__ .pytest_cache /XF *.tar.gz
          if ($LASTEXITCODE -le 7) { exit 0 } else { exit $LASTEXITCODE }

      - name: Unpack conda environments into app folder
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist_package\Corromics\envs\main
          New-Item -ItemType Directory -Force -Path dist_package\Corromics\envs\gemelli-standalone

          tar -xzf dist_package\main-env.tar.gz -C dist_package\Corromics\envs\main
          tar -xzf dist_package\gemelli-env.tar.gz -C dist_package\Corromics\envs\gemelli-standalone

          dist_package\Corromics\envs\main\Scripts\conda-unpack.exe
          dist_package\Corromics\envs\gemelli-standalone\Scripts\conda-unpack.exe

      - name: Build launcher executable
        shell: powershell
        run: |
          pyinstaller `
            --onefile `
            --name Corromics `
            --distpath dist_package\Corromics `
            --workpath build_launcher `
            --specpath build_launcher `
            launcher\CorromicsLauncher.py

      - name: Remove GraphML files from package
        shell: powershell
        run: |
          Get-ChildItem -Path dist_package\Corromics -Recurse -File -Filter *.graphml | Remove-Item -Force

      - name: Create portable ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path dist_package\Corromics `
            -DestinationPath Corromics-Windows-Portable.zip `
            -Force

      - name: Upload Windows portable app
        uses: actions/upload-artifact@v4
        with:
          name: Corromics-Windows-Portable
          path: Corromics-Windows-Portable.zip
