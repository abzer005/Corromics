name: Test WSL Gemelli

on:
  workflow_dispatch:

jobs:
  test-wsl-gemelli:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install and check WSL Ubuntu
        shell: powershell
        run: |
          wsl --status
          wsl --install -d Ubuntu --no-launch
          wsl -d Ubuntu -- bash -lc "echo WSL Ubuntu works"
          wsl -l -v

      - name: Install Miniforge inside WSL
        shell: powershell
        run: |
          wsl -d Ubuntu -- bash -lc "wget https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -O ~/miniforge.sh"
          wsl -d Ubuntu -- bash -lc "bash ~/miniforge.sh -b -p ~/miniforge3"
          wsl -d Ubuntu -- bash -lc "source ~/miniforge3/etc/profile.d/conda.sh && conda --version"

      - name: Create Gemelli environment inside WSL
        shell: powershell
        run: |
          $workspace = "${{ github.workspace }}"
          $drive = $workspace.Substring(0,1).ToLower()
          $path = $workspace.Substring(2).Replace("\", "/")
          $wslWorkspace = "/mnt/$drive$path"

          echo "Windows workspace: $workspace"
          echo "WSL workspace: $wslWorkspace"

          wsl -d Ubuntu -- bash -lc "source ~/miniforge3/etc/profile.d/conda.sh && conda env create -f '$wslWorkspace/environment-gemelli-worker.yml'"

      - name: List conda environments
        shell: powershell
        run: |
          wsl -d Ubuntu -- bash -lc "source ~/miniforge3/etc/profile.d/conda.sh && conda env list"

      - name: Test Gemelli import
        shell: powershell
        run: |
          $workspace = "${{ github.workspace }}"
          $drive = $workspace.Substring(0,1).ToLower()
          $path = $workspace.Substring(2).Replace("\", "/")
          $wslWorkspace = "/mnt/$drive$path"

          @'
          source ~/miniforge3/etc/profile.d/conda.sh
          conda activate gemelli-standalone
          python - <<'PY'
          import gemelli
          print("gemelli import OK")
          PY
          '@ | Set-Content -Path test_gemelli_import.sh -Encoding UTF8

          wsl -d Ubuntu -- bash -lc "cd '$wslWorkspace' && bash test_gemelli_import.sh"
